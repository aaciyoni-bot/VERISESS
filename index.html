<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    
    <!-- אייקון האתר (Favicon) - אייקון מגן תואם למותג -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230d9488' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/><path d='m9 12 2 2 4-4'/></svg>" />
    
    <!-- התאמה מושלמת למובייל ומניעת זום בעת ציור על הלוח -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- צבע שורת המשימות במובייל (כחול כהה של VeriSess) -->
    <meta name="theme-color" content="#1e3a8a" />
    
    <!-- תיאור למנועי חיפוש (SEO) -->
    <meta name="description" content="VeriSess - קליניקה וירטואלית מאובטחת לייעוץ ושיחות וידאו מוצפנות." />
    
    <title>VeriSess - הקליניקה הווירטואלית המאובטחת</title>
    
    <!-- הגדרת גופן מודרני (Assistant) שתומך עברית בצורה חלקה -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* הגדרת גופן ברירת המחדל לכל המערכת ואיפוס שוליים */
      body {
        font-family: 'Assistant', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9fafb; /* רקע אפור בהיר בסיסי */
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <!-- הודעה למקרה שה-JavaScript חסום -->
    <noscript>עליך לאפשר JavaScript בהגדרות הדפדפן כדי להריץ את סביבת VeriSess.</noscript>
    
    <!-- עוגן האפליקציה המרכזי -->
    <div id="root"></div>

    <!-- חיבור ישיר לקובץ ה-React (הכרחי עבור מנוע Vite) -->
    <script type="module" src="/src/main.jsx"></script> 
  </body>
</html>
